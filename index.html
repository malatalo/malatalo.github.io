<html>
  <head>

    <!-- You'll find nothing of value here -->
    
    <title>:)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css?family=Coming+Soon&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/css?family=Schoolbell&display=swap" rel="stylesheet" />
    <style>
      html {
        font-family: "Coming Soon", cursive;
        font-size: 20px;
        color: white;
        background-image: url("bg.jpg");
        cursor: none !important;
        overflow-x: hidden;
        padding-bottom: 300px;
      }
      center {
        margin: auto;
        width: 80%;
        border: 20px ridge #cdcdcd;
      }
      #marquee {
        width: 100%;
        height: 160px;
        border-bottom: 20px ridge #cdcdcd;
        font-size: 40px;
      }
      #cursor {
        position: absolute;
        z-index: 10000;
        width: 200px;
        height: 200px;
        background: transparent url("cursor.gif") 0 0 no-repeat;
        pointer-events: none;
      }
      #commentBox {
        width: 500px;
        height: 100px;
      }
      .border {
        border-bottom: 20px ridge #cdcdcd;
      }
      .divi {
        padding: 50px
      }
      a{
        cursor: none;
      }
      .tg{
        height: 50px;
      }
      .construction {
        position:fixed;
        left: 0px;
        top: 0px;
      }
      .litDiv {
        height: 300px;
        width: 100vw;
        position:fixed;
        left: 0px;
        bottom: -50px;
        background: transparent url("fire.gif") repeat-x;

      }
    </style>
  </head>
  <body>
    <div id="cursor"></div>
    <div align="center">Welcome to...</div>
    <center>
      <marquee id="marquee" direction="down" behavior="alternate">
        <marquee behavior="alternate" direction="right">
          <img class="tg" src="floss.gif"/>
          <span>Alata.lol</span>
          <img class="tg" src="dab.gif"/>
        </marquee>
      </marquee>
      <div class="border divi">
        <a href="mysterium-companion">Mysterium companion</a> <br />
        <a href="hp-tracker">hp-tracker</a> <br />
        <a href="Betrayal-stats">betrayal stats</a> <br />
        <a href="P5jsDoodles">P5.js doodles</a> <br />
        <a href="ai-flappy">ai-flappy</a> <br />
        <a href="read">read</a> <br />
        <a href="qr">QR</a> <br />
        <a href="base64">Base64</a> <br />
        <a href="https://github.com/malatalo/Steamer">Steamer</a> <br />
      </div>
      <div class="divi">
        Guest book:<br/>
        Please leave a comment:<br/>
        <textarea id="commentBox"></textarea><br/>
        <button>&nbsp;Send&nbsp;</button>
      </div>
    </center>
    <img class="construction" src="const.gif"/>
    <div class="litDiv"></div>
  </body>
  <script type="text/javascript">
    window.onload = () => {
      let hash = window.location.hash;
      if (hash) {
        window.location = "https://malatalo.github.io/qr" + hash;
      }
      const commentBox = document.getElementById("commentBox");
      const cthulhu = " Ph'nglui mglw'nafh Cthulhu R'lyeh wgah'nagl fhtagn.";
      commentBox.addEventListener('input', e => {
        if (e.inputType === "deleteContentBackward" || e.inputType === "deleteContentForward") {
          return;
        }
        let commentText = e.target.value.slice(0, -1);
        const currentCount = commentText.length + 1;
        let subCount = currentCount % cthulhu.length;
        const cthulhuChar = cthulhu.charAt(subCount);
        commentText += cthulhuChar;
        commentBox.value = commentText;
      }, false);
    };

    var cursorOffset = {
      left: 65,
      top: 65
    };

    document.getElementsByTagName("HTML")[0].addEventListener(
      "mousemove",
      function(e) {
        var $cursor = document.getElementById("cursor");

        $cursor.style.left = e.pageX - cursorOffset.left + "px";
        $cursor.style.top = e.pageY - cursorOffset.top + "px";
      },
      false
    );
  </script>
</html>
